name: Keep App Awake

on:
  schedule:
    # This runs every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Streamlit
        run: curl -I https://56-tools.streamlit.app/
